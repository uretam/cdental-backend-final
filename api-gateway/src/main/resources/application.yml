server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # 1. Microservicio de Autenticación (Puerto 8081)
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        # 2. Microservicio de Pacientes (Puerto 8082)
        - id: paciente-service
          uri: http://localhost:8082
          predicates:
            - Path=/pacientes/**

        # 3. Microservicio de Odontólogos (Puerto 8083)
        - id: odontologo-service
          uri: http://localhost:8083
          predicates:
            - Path=/odontologos/**

        # 4. Microservicio de Tratamientos (Puerto 8084)
        - id: tratamientos-service
          uri: http://localhost:8084
          predicates:
            - Path=/tratamientos/**

        # 5. Microservicio de Citas (Puerto 8085)
        - id: citas-service
          uri: http://localhost:8085
          predicates:
            - Path=/citas/**

        # 6. Microservicio de Pagos (Puerto 8086)
        - id: pagos-service
          uri: http://localhost:8086
          predicates:
            - Path=/pagos/**

        # 7. Microservicio de Historial Clínico / Fichas (Puerto 8087)
        - id: historial-service
          uri: http://localhost:8087
          predicates:
            - Path=/historiales/**

        # 8. Microservicio de Insumos / Inventario (Puerto 8088)
        - id: insumos-service
          uri: http://localhost:8088
          predicates:
            - Path=/insumos/**