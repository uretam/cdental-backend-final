services:
  # ==========================================
  # BASES DE DATOS
  # ==========================================
  db-auth:
    image: mysql:8.0
    container_name: db-auth
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_auth
    ports:
      - "33061:3306"
    volumes:
      - vol-auth:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  db-pacientes:
    image: mysql:8.0
    container_name: db-pacientes
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_pacientes
    ports:
      - "33062:3306"
    volumes:
      - vol-pacientes:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  db-odontologos:
    image: mysql:8.0
    container_name: db-odontologos
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_odontologos
    ports:
      - "33063:3306"
    volumes:
      - vol-odontologos:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  db-tratamientos:
    image: mysql:8.0
    container_name: db-tratamientos
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_tratamientos
    ports:
      - "33064:3306"
    volumes:
      - vol-tratamientos:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  db-citas:
    image: mysql:8.0
    container_name: db-citas
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_citas
    ports:
      - "33065:3306"
    volumes:
      - vol-citas:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  db-pagos:
    image: mysql:8.0
    container_name: db-pagos
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_pagos
    ports:
      - "33066:3306"
    volumes:
      - vol-pagos:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  db-historial:
    image: mysql:8.0
    container_name: db-historial
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_historial
    ports:
      - "33067:3306"
    volumes:
      - vol-historial:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  db-insumos:
    image: mysql:8.0
    container_name: db-insumos
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_insumos
    ports:
      - "33068:3306"
    volumes:
      - vol-insumos:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ==========================================
  # MICROSERVICIOS CORE
  # ==========================================
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "9081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      db-auth:
        condition: service_healthy

  paciente-service:
    build: ./paciente-service
    container_name: paciente-service
    ports:
      - "9082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      db-pacientes:
        condition: service_healthy

  odontologo-service:
    build: ./odontologo-service
    container_name: odontologo-service
    ports:
      - "9083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      db-odontologos:
        condition: service_healthy

  tratamientos-service:
    build: ./tratamientos-service
    container_name: tratamientos-service
    ports:
      - "9084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      db-tratamientos:
        condition: service_healthy

  citas-service:
    build: ./citas-service
    container_name: citas-service
    ports:
      - "9085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      db-citas:
        condition: service_healthy

  pagos-service:
    build: ./pagos-service
    container_name: pagos-service
    ports:
      - "9086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      db-pagos:
        condition: service_healthy

  historial-service:
    build: ./historial-service
    container_name: historial-service
    ports:
      - "9087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      db-historial:
        condition: service_healthy

  insumos-service:
    build: ./insumos-service
    container_name: insumos-service
    ports:
      - "9088:8088"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      db-insumos:
        condition: service_healthy

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "9080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      - auth-service
      - paciente-service
      - odontologo-service
      - tratamientos-service
      - citas-service
      - pagos-service
      - historial-service
      - insumos-service

volumes:
  vol-auth:
  vol-pacientes:
  vol-odontologos:
  vol-tratamientos:
  vol-citas:
  vol-pagos:
  vol-historial:
  vol-insumos:
