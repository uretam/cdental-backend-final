version: '3.8'

services:
  # ==========================================
  # BASES DE DATOS (Mantenemos tus puertos externos)
  # ==========================================
  db-auth:
    image: mysql:8.0
    container_name: db-auth
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_auth
    ports:
      - "33061:3306"
    volumes:
      - vol-auth:/var/lib/mysql

  db-pacientes:
    image: mysql:8.0
    container_name: db-pacientes
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_pacientes
    ports:
      - "33062:3306"
    volumes:
      - vol-pacientes:/var/lib/mysql

  db-odontologos:
    image: mysql:8.0
    container_name: db-odontologos
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_odontologos
    ports:
      - "33063:3306"
    volumes:
      - vol-odontologos:/var/lib/mysql

  db-tratamientos:
    image: mysql:8.0
    container_name: db-tratamientos
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_tratamientos
    ports:
      - "33064:3306"
    volumes:
      - vol-tratamientos:/var/lib/mysql

  db-citas:
    image: mysql:8.0
    container_name: db-citas
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_citas
    ports:
      - "33065:3306"
    volumes:
      - vol-citas:/var/lib/mysql

  db-pagos:
    image: mysql:8.0
    container_name: db-pagos
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_pagos
    ports:
      - "33066:3306"
    volumes:
      - vol-pagos:/var/lib/mysql

  db-historial:
    image: mysql:8.0
    container_name: db-historial
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_historial
    ports:
      - "33067:3306"
    volumes:
      - vol-historial:/var/lib/mysql

  db-insumos:
    image: mysql:8.0
    container_name: db-insumos
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_insumos
    ports:
      - "33068:3306"
    volumes:
      - vol-insumos:/var/lib/mysql

  # ==========================================
  # MICROSERVICIOS CORE (Compilan con sus Dockerfiles)
  # ==========================================
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    depends_on:
      - db-auth

  paciente-service:
    build: ./paciente-service
    container_name: paciente-service
    ports:
      - "8082:8082"
    depends_on:
      - db-pacientes

  odontologo-service:
    build: ./odontologo-service
    container_name: odontologo-service
    ports:
      - "8083:8083"
    depends_on:
      - db-odontologos

  tratamientos-service:
    build: ./tratamientos-service
    container_name: tratamientos-service
    ports:
      - "8084:8084"
    depends_on:
      - db-tratamientos

  citas-service:
    build: ./citas-service
    container_name: citas-service
    ports:
      - "8085:8085"
    depends_on:
      - db-citas

  pagos-service:
    build: ./pagos-service
    container_name: pagos-service
    ports:
      - "8086:8086"
    depends_on:
      - db-pagos

  historial-service:
    build: ./historial-service
    container_name: historial-service
    ports:
      - "8087:8087"
    depends_on:
      - db-historial

  insumos-service:
    build: ./insumos-service
    container_name: insumos-service
    ports:
      - "8088:8088"
    depends_on:
      - db-insumos

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - paciente-service
      - odontologo-service
      - tratamientos-service
      - citas-service
      - pagos-service
      - historial-service
      - insumos-service

volumes:
  vol-auth:
  vol-pacientes:
  vol-odontologos:
  vol-tratamientos:
  vol-citas:
  vol-pagos:
  vol-historial:
  vol-insumos: